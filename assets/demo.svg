<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- window -->
  <rect x="1" y="1" width="758" height="438" rx="12" fill="#0a0a0f" stroke="#1f2430"/>
  <!-- title bar -->
  <path d="M1 13 a12 12 0 0 1 12 -12 h734 a12 12 0 0 1 12 12 v25 h-758 z" fill="#11141c"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="380" y="24" fill="#6b7280" font-size="12" text-anchor="middle">sentineldeck — scan</text>

  <!-- typed command (clip reveals it left-to-right; static fallback shows it fully) -->
  <text x="22" y="74" font-size="15" fill="#27c93f">$</text>
  <clipPath id="type">
    <rect x="40" y="60" width="300" height="22">
      <animate attributeName="width" dur="7s" repeatCount="indefinite"
               values="0;0;300;300;300;0" keyTimes="0;0.02;0.18;0.88;0.95;1"/>
    </rect>
  </clipPath>
  <text x="40" y="74" font-size="15" fill="#e5e7eb" clip-path="url(#type)">sentineldeck scan example.com</text>

  <!-- output: each line stays visible in static fallback, fades in on cue when animated -->
  <g>
    <!-- brand -->
    <g>
      <rect x="40" y="104" width="13" height="18" fill="#dc2626"/>
      <rect x="56" y="104" width="13" height="18" fill="#dc2626"/>
      <text x="80" y="119" font-size="16" font-weight="bold" fill="#ef4444">SENTINELDECK</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.20;0.23;0.9;1"/>
    </g>
    <!-- grade -->
    <g>
      <text x="40" y="158" font-size="15" fill="#9ca3af">Grade</text>
      <text x="96" y="158" font-size="17" font-weight="bold" fill="#f59e0b">C</text>
      <text x="120" y="158" font-size="15" fill="#9ca3af">Score</text>
      <text x="178" y="158" font-size="15" fill="#e5e7eb">49/100</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.25;0.28;0.9;1"/>
    </g>
    <line x1="40" y1="174" x2="720" y2="174" stroke="#1f2430">
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.27;0.30;0.9;1"/>
    </line>
    <!-- findings -->
    <g>
      <circle cx="46" cy="199" r="5" fill="#dc2626"/>
      <text x="60" y="204" font-size="14" fill="#f87171">HIGH</text>
      <text x="128" y="204" font-size="14" fill="#d1d5db">DMARC record is missing</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.32;0.35;0.9;1"/>
    </g>
    <g>
      <circle cx="46" cy="227" r="5" fill="#f59e0b"/>
      <text x="60" y="232" font-size="14" fill="#fbbf24">MED</text>
      <text x="128" y="232" font-size="14" fill="#d1d5db">No DKIM signature detected</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.37;0.40;0.9;1"/>
    </g>
    <g>
      <circle cx="46" cy="255" r="5" fill="#eab308"/>
      <text x="60" y="260" font-size="14" fill="#facc15">LOW</text>
      <text x="128" y="260" font-size="14" fill="#d1d5db">HSTS max-age is short</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.42;0.45;0.9;1"/>
    </g>
    <g>
      <circle cx="46" cy="283" r="5" fill="#6b7280"/>
      <text x="60" y="288" font-size="14" fill="#9ca3af">INFO</text>
      <text x="128" y="288" font-size="14" fill="#d1d5db">No IPv6 (AAAA) records</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.47;0.50;0.9;1"/>
    </g>
    <!-- each finding ships a copy-paste fix -->
    <g>
      <text x="40" y="330" font-size="13" fill="#6b7280">→ fix: _dmarc.example.com  TXT  "v=DMARC1; p=reject; rua=mailto:dmarc@example.com"</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.54;0.57;0.9;1"/>
    </g>
    <!-- summary -->
    <g>
      <text x="40" y="372" font-size="14" fill="#e5e7eb">13 findings · 4 quick wins · </text>
      <text x="300" y="372" font-size="14" fill="#34d399">report.html written</text>
      <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
               values="0;0;1;1;0" keyTimes="0;0.60;0.63;0.9;1"/>
    </g>
  </g>

  <!-- passive badge -->
  <g transform="translate(560,108)">
    <rect x="0" y="0" width="160" height="22" rx="11" fill="#1a1410" stroke="#dc2626" stroke-opacity="0.5"/>
    <text x="80" y="15" font-size="11" fill="#f87171" text-anchor="middle">PASSIVE · SAFE TO RUN</text>
  </g>
</svg>
