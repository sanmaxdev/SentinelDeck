<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="SentinelDeck - passive attack-surface radar">
  <defs>
    <radialGradient id="glowR" cx="92%" cy="2%" r="75%">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowL" cx="2%" cy="98%" r="80%">
      <stop offset="0" stop-color="#7f1d1d" stop-opacity="0.40"/>
      <stop offset="0.6" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc2626" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#26262f" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="1196" height="296" rx="22" fill="#0a0a0f"/>
  <rect x="2" y="2" width="1196" height="296" rx="22" fill="url(#glowR)"/>
  <rect x="2" y="2" width="1196" height="296" rx="22" fill="url(#glowL)"/>
  <rect x="2.75" y="2.75" width="1194.5" height="294.5" rx="21" fill="none" stroke="url(#edge)" stroke-width="1.5"/>

  <g transform="translate(1015,150)" fill="none" stroke="#dc2626" stroke-width="1.5">
    <circle r="100" stroke-opacity="0.10"/>
    <circle r="74" stroke-opacity="0.14"/>
    <circle r="50" stroke-opacity="0.20"/>
    <circle r="24" stroke-opacity="0.30"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke-opacity="0.12"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke-opacity="0.12"/>
    <path d="M0 0 L64.3 -76.6 A100 100 0 0 1 100 0 Z" fill="#dc2626" fill-opacity="0.14" stroke="none"/>
    <circle r="5" fill="#ef4444" stroke="none"/>
    <circle cx="60" cy="-71" r="4.5" fill="#f87171" stroke="none"/>
  </g>

  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="62" y="106" font-size="18" letter-spacing="6" font-weight="700" fill="#f87171">PASSIVE ATTACK-SURFACE RADAR</text>
    <text x="58" y="182" font-size="78" font-weight="800" letter-spacing="-1.5" fill="#f5f5f7">Sentinel<tspan fill="#dc2626">Deck</tspan></text>
    <text x="62" y="230" font-size="22" fill="#9b9ba8">One safe scan turns a domain into a clear risk grade and report.</text>
  </g>
