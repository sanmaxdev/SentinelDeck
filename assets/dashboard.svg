<svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0e12"/><stop offset="0.5" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="958" height="598" rx="14" fill="url(#bg)" stroke="#242636"/>

  <!-- top bar -->
  <rect x="1" y="1" width="958" height="56" fill="#11121b"/>
  <rect x="26" y="20" width="12" height="20" rx="2" fill="#dc2626"/>
  <text x="48" y="35" fill="#e8e8ee" font-size="16" font-weight="800" letter-spacing="1">SENTINEL<tspan fill="#ef4444">DECK</tspan></text>
  <rect x="640" y="16" width="210" height="26" rx="7" fill="#12131b" stroke="#242636"/>
  <text x="654" y="33" fill="#9ca3af" font-size="13">example.com</text>
  <rect x="858" y="16" width="76" height="26" rx="7" fill="#dc2626"/>
  <text x="896" y="33" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Scan</text>

  <!-- grade hero -->
  <rect x="26" y="78" width="908" height="92" rx="14" fill="#12131b" stroke="#242636"/>
  <rect x="44" y="94" width="60" height="60" rx="12" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <text x="74" y="138" fill="#f59e0b" font-size="38" font-weight="900" text-anchor="middle">C</text>
  <text x="124" y="116" fill="#e8e8ee" font-size="19" font-weight="700">example.com</text>
  <text x="124" y="140" fill="#9ca3af" font-size="13">Risk 49/100 · 14 findings · grade C</text>
  <g font-size="12" fill="#9ca3af">
    <circle cx="540" cy="124" r="4" fill="#fb923c"/><text x="551" y="128">1 medium</text>
    <circle cx="640" cy="124" r="4" fill="#facc15"/><text x="651" y="128">7 low</text>
    <circle cx="720" cy="124" r="4" fill="#a78bfa"/><text x="731" y="128">6 info</text>
  </g>

  <!-- remediation simulator -->
  <rect x="26" y="182" width="908" height="48" rx="12" fill="#171823" stroke="#242636"/>
  <text x="44" y="211" fill="#f87171" font-size="11" font-weight="800" letter-spacing="1">REMEDIATION SIMULATOR</text>
  <text x="214" y="213" fill="#22c55e" font-size="24" font-weight="900">A</text>
  <text x="246" y="211" fill="#e8e8ee" font-size="13" font-weight="700">projected risk 12/100</text>
  <text x="410" y="211" fill="#6b7280" font-size="12">3 fixes applied — tick findings to watch the grade improve</text>

  <!-- card grid -->
  <g>
    <!-- card template helper drawn inline -->
    <g>
      <rect x="26" y="244" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="44" y="270" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">TLS CERTIFICATE</text>
      <text x="44" y="296" fill="#9ca3af" font-size="13">Valid &amp; trusted</text><text x="298" y="296" fill="#22c55e" font-size="13" text-anchor="end">yes</text>
      <text x="44" y="320" fill="#9ca3af" font-size="13">Protocol</text><text x="298" y="320" fill="#22c55e" font-size="13" text-anchor="end">TLSv1.3</text>
      <text x="44" y="344" fill="#9ca3af" font-size="13">Expires in</text><text x="298" y="344" fill="#e8e8ee" font-size="13" text-anchor="end">71 days</text>
      <text x="44" y="368" fill="#9ca3af" font-size="13">Config grade</text><text x="298" y="368" fill="#22c55e" font-size="13" text-anchor="end">intermediate</text>
    </g>
    <g>
      <rect x="335" y="244" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="353" y="270" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">EMAIL AUTHENTICATION</text>
      <text x="353" y="296" fill="#9ca3af" font-size="13">SPF</text><text x="607" y="296" fill="#22c55e" font-size="13" text-anchor="end">yes (-all)</text>
      <text x="353" y="320" fill="#9ca3af" font-size="13">DMARC</text><text x="607" y="320" fill="#22c55e" font-size="13" text-anchor="end">yes (reject)</text>
      <text x="353" y="344" fill="#9ca3af" font-size="13">DKIM</text><text x="607" y="344" fill="#22c55e" font-size="13" text-anchor="end">yes</text>
      <text x="353" y="368" fill="#9ca3af" font-size="13">MTA-STS</text><text x="607" y="368" fill="#f43f5e" font-size="13" text-anchor="end">no</text>
    </g>
    <g>
      <rect x="644" y="244" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="662" y="270" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">LOOKALIKE DOMAINS</text>
      <text x="662" y="296" fill="#9ca3af" font-size="13">Variants checked</text><text x="916" y="296" fill="#e8e8ee" font-size="13" text-anchor="end">37</text>
      <text x="662" y="320" fill="#9ca3af" font-size="13">Registered</text><text x="916" y="320" fill="#fb923c" font-size="13" text-anchor="end">5</text>
      <g font-size="11" fill="#fb923c">
        <rect x="662" y="334" width="74" height="20" rx="10" fill="#1a1410" stroke="#fb923c" stroke-opacity="0.5"/><text x="699" y="348" text-anchor="middle">examp1e.com</text>
        <rect x="744" y="334" width="74" height="20" rx="10" fill="#1a1410" stroke="#fb923c" stroke-opacity="0.5"/><text x="781" y="348" text-anchor="middle">exarnple.co</text>
      </g>
    </g>
    <g>
      <rect x="26" y="414" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="44" y="440" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">TECHNOLOGY STACK</text>
      <g font-size="12" fill="#e8e8ee">
        <rect x="44" y="454" width="70" height="22" rx="11" fill="#171823" stroke="#242636"/><text x="79" y="469" text-anchor="middle">Next.js</text>
        <rect x="122" y="454" width="84" height="22" rx="11" fill="#171823" stroke="#242636"/><text x="164" y="469" text-anchor="middle">Cloudflare</text>
        <rect x="214" y="454" width="58" height="22" rx="11" fill="#171823" stroke="#242636"/><text x="243" y="469" text-anchor="middle">nginx</text>
        <rect x="44" y="484" width="74" height="22" rx="11" fill="#171823" stroke="#242636"/><text x="81" y="499" text-anchor="middle">React 18</text>
      </g>
      <text x="44" y="540" fill="#9ca3af" font-size="12">WAF / CDN</text><text x="298" y="540" fill="#22c55e" font-size="12" text-anchor="end">Cloudflare</text>
    </g>
    <g>
      <rect x="335" y="414" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="353" y="440" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">SERVER / IP INTEL</text>
      <text x="353" y="466" fill="#9ca3af" font-size="13">Location</text><text x="607" y="466" fill="#e8e8ee" font-size="13" text-anchor="end">Frankfurt, DE</text>
      <text x="353" y="490" fill="#9ca3af" font-size="13">Org</text><text x="607" y="490" fill="#e8e8ee" font-size="13" text-anchor="end">Cloudflare, Inc.</text>
      <text x="353" y="514" fill="#9ca3af" font-size="13">ASN</text><text x="607" y="514" fill="#e8e8ee" font-size="13" text-anchor="end">AS13335</text>
      <text x="353" y="538" fill="#9ca3af" font-size="13">Subdomains</text><text x="607" y="538" fill="#e8e8ee" font-size="13" text-anchor="end">24 found</text>
    </g>
    <g>
      <rect x="644" y="414" width="290" height="158" rx="12" fill="#12131b" stroke="#242636"/>
      <text x="662" y="440" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1">THREAT REPUTATION</text>
      <text x="662" y="466" fill="#9ca3af" font-size="13">Status</text><text x="916" y="466" fill="#22c55e" font-size="13" text-anchor="end">clean</text>
      <text x="662" y="490" fill="#9ca3af" font-size="13">Archive history</text><text x="916" y="490" fill="#e8e8ee" font-size="13" text-anchor="end">since 2009</text>
      <text x="662" y="514" fill="#9ca3af" font-size="13">DNSSEC</text><text x="916" y="514" fill="#22c55e" font-size="13" text-anchor="end">enabled</text>
      <text x="662" y="538" fill="#9ca3af" font-size="13">HSTS</text><text x="916" y="538" fill="#22c55e" font-size="13" text-anchor="end">preloaded</text>
    </g>
