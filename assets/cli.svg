<svg xmlns="http://www.w3.org/2000/svg" width="768" height="540" viewBox="0 0 768 540" role="img" aria-label="SentinelDeck command-line home screen">
  <defs>
    <clipPath id="round"><rect x="1" y="1" width="766" height="538" rx="12"/></clipPath>
  </defs>
  <rect x="1" y="1" width="766" height="538" rx="12" fill="#0a0a0f"/>
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="768" height="38" fill="#15151c"/>
    <circle cx="20" cy="19" r="5.5" fill="#ef4444"/>
    <circle cx="39" cy="19" r="5.5" fill="#f5b340"/>
    <circle cx="58" cy="19" r="5.5" fill="#3ecf6a"/>
    <text x="78" y="23" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#6e6e7a">sentineldeck</text>
  </g>
  <rect x="1" y="1" width="766" height="538" rx="12" fill="none" stroke="#2a2a33"/>
  <text font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14" xml:space="preserve">
    <tspan x="22" y="66"><tspan fill="#6e6e7a">$ </tspan><tspan fill="#f5f5f7">sentineldeck</tspan></tspan>
    <tspan x="22" y="108"><tspan fill="#ef4444" font-weight="700">  ██  </tspan><tspan fill="#f5f5f7" font-weight="700">SentinelDeck</tspan><tspan fill="#6e6e7a">  v0.2.0</tspan></tspan>
    <tspan x="22" y="129"><tspan fill="#ef4444" font-weight="700">  ██  </tspan><tspan fill="#9b9ba8">Passive attack-surface radar</tspan></tspan>
    <tspan x="22" y="160" fill="#7f2222">────────────────────────────────────────────────────────</tspan>
    <tspan x="22" y="194" fill="#ef4444" font-weight="700">  COMMANDS</tspan>
    <tspan x="22" y="215"><tspan fill="#f87171" font-weight="700">    scan     </tspan><tspan fill="#9b9ba8">Run a safe passive scan against a domain</tspan></tspan>
    <tspan x="22" y="236"><tspan fill="#f87171" font-weight="700">    report   </tspan><tspan fill="#9b9ba8">Render a saved report as HTML, a score card, or a badge</tspan></tspan>
    <tspan x="22" y="257"><tspan fill="#f87171" font-weight="700">    diff     </tspan><tspan fill="#9b9ba8">Compare two scans and show what changed</tspan></tspan>
    <tspan x="22" y="278"><tspan fill="#f87171" font-weight="700">    monitor  </tspan><tspan fill="#9b9ba8">Scan on a schedule and alert on regressions</tspan></tspan>
    <tspan x="22" y="312" fill="#ef4444" font-weight="700">  QUICK START</tspan>
    <tspan x="22" y="333"><tspan fill="#6e6e7a">    $ </tspan><tspan fill="#f5f5f7">sentineldeck scan example.com</tspan></tspan>
    <tspan x="22" y="354"><tspan fill="#6e6e7a">    $ </tspan><tspan fill="#f5f5f7">sentineldeck scan example.com -o report.json</tspan></tspan>
    <tspan x="22" y="375"><tspan fill="#6e6e7a">    $ </tspan><tspan fill="#f5f5f7">sentineldeck report report.json --html report.html</tspan></tspan>
    <tspan x="22" y="409" fill="#ef4444" font-weight="700">  TIP</tspan>
    <tspan x="22" y="430" fill="#9b9ba8">    Every finding ships a copy-paste fix. Open the HTML report to</tspan>
    <tspan x="22" y="451" fill="#9b9ba8">    use the interactive remediation simulator with a client.</tspan>
    <tspan x="22" y="485" fill="#7f2222">────────────────────────────────────────────────────────</tspan>
    <tspan x="22" y="510"><tspan fill="#6e6e7a">  docs </tspan><tspan fill="#f87171">github.com/sanmaxdev/SentinelDeck</tspan><tspan fill="#6e6e7a">   ·   </tspan><tspan fill="#9b9ba8">pip install -U sentineldeck</tspan></tspan>
  </text>
</svg>
